services:
  - type: web
    name: mediscan-plus
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
